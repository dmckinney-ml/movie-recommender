# PIPELINE DEFINITION
# Name: movie-recommender-pipeline
# Description: Pipeline to train and serve a movie recommendation model.
# Inputs:
#    gcs_bucket_name: str [Default: 'movie-data-1']
components:
  comp-movierecommendertraining:
    executorLabel: exec-movierecommendertraining
    inputDefinitions:
      parameters:
        base_output_directory:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        display_name:
          defaultValue: movie-recommender-training-job
          isOptional: true
          parameterType: STRING
        enable_web_access:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        encryption_spec_key_name:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        labels:
          defaultValue: {}
          isOptional: true
          parameterType: STRUCT
        location:
          defaultValue: '{{$.pipeline_google_cloud_location}}'
          isOptional: true
          parameterType: STRING
        network:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        persistent_resource_id:
          defaultValue: '{{$.pipeline_persistent_resource_id}}'
          isOptional: true
          parameterType: STRING
        project:
          defaultValue: '{{$.pipeline_google_cloud_project_id}}'
          isOptional: true
          parameterType: STRING
        reserved_ip_ranges:
          defaultValue: []
          isOptional: true
          parameterType: LIST
        restart_job_on_worker_restart:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        service_account:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        strategy:
          defaultValue: STANDARD
          isOptional: true
          parameterType: STRING
        tensorboard:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        timeout:
          defaultValue: 604800s
          isOptional: true
          parameterType: STRING
        worker_pool_specs:
          defaultValue:
          - container_spec:
              args: []
              command:
              - python3
              - /src/main.py
              env: []
              image_uri: us-central1-docker.pkg.dev/oolola/oolola-repo/moviedata-training:latest
            disk_spec:
              boot_disk_size_gb: 100.0
              boot_disk_type: pd-ssd
            machine_spec:
              accelerator_count: '1'
              accelerator_type: NVIDIA_TESLA_P4
              machine_type: n1-standard-8
            replica_count: 1.0
          isOptional: true
          parameterType: LIST
    outputDefinitions:
      parameters:
        gcp_resources:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-movierecommendertraining:
      container:
        args:
        - --type
        - CustomJob
        - --payload
        - '{"display_name": "{{$.inputs.parameters[''display_name'']}}", "job_spec":
          {"worker_pool_specs": {{$.inputs.parameters[''worker_pool_specs'']}}, "scheduling":
          {"timeout": "{{$.inputs.parameters[''timeout'']}}", "restart_job_on_worker_restart":
          {{$.inputs.parameters[''restart_job_on_worker_restart'']}}, "strategy":
          "{{$.inputs.parameters[''strategy'']}}"}, "service_account": "{{$.inputs.parameters[''service_account'']}}",
          "tensorboard": "{{$.inputs.parameters[''tensorboard'']}}", "enable_web_access":
          {{$.inputs.parameters[''enable_web_access'']}}, "network": "{{$.inputs.parameters[''network'']}}",
          "reserved_ip_ranges": {{$.inputs.parameters[''reserved_ip_ranges'']}}, "base_output_directory":
          {"output_uri_prefix": "{{$.inputs.parameters[''base_output_directory'']}}"},
          "persistent_resource_id": "{{$.inputs.parameters[''persistent_resource_id'']}}"},
          "labels": {{$.inputs.parameters[''labels'']}}, "encryption_spec": {"kms_key_name":
          "{{$.inputs.parameters[''encryption_spec_key_name'']}}"}}'
        - --project
        - '{{$.inputs.parameters[''project'']}}'
        - --location
        - '{{$.inputs.parameters[''location'']}}'
        - --gcp_resources
        - '{{$.outputs.parameters[''gcp_resources''].output_file}}'
        command:
        - python3
        - -u
        - -m
        - google_cloud_pipeline_components.container.v1.custom_job.launcher
        image: gcr.io/ml-pipeline/google-cloud-pipeline-components:2.18.0
pipelineInfo:
  description: Pipeline to train and serve a movie recommendation model.
  name: movie-recommender-pipeline
root:
  dag:
    tasks:
      movierecommendertraining:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-movierecommendertraining
        inputs:
          parameters:
            location:
              runtimeValue:
                constant: us-central1
            project:
              runtimeValue:
                constant: oolola
        taskInfo:
          name: movierecommendertraining
  inputDefinitions:
    parameters:
      gcs_bucket_name:
        defaultValue: movie-data-1
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.10.1
