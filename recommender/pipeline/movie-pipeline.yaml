# PIPELINE DEFINITION
# Name: movie-recommender-pipeline
# Description: Pipeline to train and serve a movie recommendation model.
# Inputs:
#    gcs_bucket_name: str [Default: 'movie-data-1']
components:
  comp-movierecommendertraining:
    executorLabel: exec-movierecommendertraining
deploymentSpec:
  executors:
    exec-movierecommendertraining:
      container:
        command:
        - python3
        - /src/main.py
        image: us-central1-docker.pkg.dev/oolola/oolola-repo/moviedata-training:latest
pipelineInfo:
  description: Pipeline to train and serve a movie recommendation model.
  name: movie-recommender-pipeline
root:
  dag:
    tasks:
      movierecommendertraining:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-movierecommendertraining
        taskInfo:
          name: movierecommendertraining
  inputDefinitions:
    parameters:
      gcs_bucket_name:
        defaultValue: movie-data-1
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.11.0
